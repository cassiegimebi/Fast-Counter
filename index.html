<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Inventory Counter</title>
  <link rel="stylesheet" href="styles.css" />
  <!-- Google Fonts for typography -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <!-- SheetJS CDN for Excel export -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>
  <div id="app">
    <!-- MAIN SCREEN -->
    <section id="main-screen" class="screen active">
      <header class="app-header">
        <div style="display: flex; align-items: center; gap: 12px;">
          <button id="btn-lang" class="icon-button" style="border:1px solid var(--border); padding:4px 8px; font-size:0.875rem; font-weight:600;">EN/JA</button>
          <h1 data-i18n="titleMain">Inventory</h1>
        </div>
        <button id="btn-reset" class="icon-button text-button" data-i18n="resetAll">Reset All</button>
      </header>
      
      <main class="list-container" id="inventory-list">
        <!-- Items will be dynamically injected here -->
      </main>

      <div class="bottom-action">
        <button id="btn-finish" class="primary-button" data-i18n="finishCounting">Finish Counting</button>
      </div>
    </section>

    <!-- SUMMARY SCREEN -->
    <section id="summary-screen" class="screen hidden">
      <header class="app-header">
        <button id="btn-back" class="icon-button">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
        </button>
        <h1 data-i18n="titleSummary">Summary</h1>
        <div style="width:24px"></div> <!-- Placeholder for alignment -->
      </header>

      <main class="list-container" id="summary-list">
        <!-- Summary items will be dynamically injected here -->
      </main>

      <div class="bottom-action" style="gap: 12px;">
        <button id="btn-export-csv" class="secondary-button" style="flex:1" data-i18n="exportCsv">Export CSV</button>
        <button id="btn-export-excel" class="primary-button" style="flex:1" data-i18n="exportExcel">Export Excel</button>
      </div>
    </section>
  </div>

  <script src="app.js"></script>
</body>
</html>
